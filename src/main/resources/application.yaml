server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false # Evita que el servidor intente registrarse a sí mismo
    fetch-registry: false       # Evita que intente buscar otros servidores locales
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/